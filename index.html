<!doctype html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio-react</title>

  <script>
    // Apply theme BEFORE React loads (prevents flash of wrong theme)
    (function () {
      try {
        const saved = localStorage.getItem("theme");
        let themeToApply;

        if (saved === "dark" || saved === "light") {
          themeToApply = saved;
        } else if (saved === "system" || !saved) {
          // system mode or first visit - use OS preference
          themeToApply = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        } else {
          themeToApply = "light"; // safety fallback
        }

        // Apply class immediately
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(themeToApply);
        document.documentElement.style.colorScheme = themeToApply;
      } catch (e) {
        // If localStorage is blocked, use light mode
        document.documentElement.classList.add("light");
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
